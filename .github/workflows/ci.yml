name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Lint · Type-check · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        # Using `npm install` (not `npm ci`) because @auth/core and
        # next-auth pull in mismatched peer versions of preact that
        # confuse npm ci's strict verification. npm install resolves
        # them the same way locally.
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        # Prisma 7 requires `prisma generate` before tsc/next sees the types.
        # schema has no datasource `url` (that lives in prisma.config.ts), so
        # this works without a live DB.
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        # Next.js build collects page data; our prisma client proxy is lazy
        # so no DATABASE_URL is needed here.
        env:
          AUTH_TOKEN_SECRET: ci-test-secret-not-used-for-runtime
        run: npm run build
