# Cloud Build pipeline for Cloud Run deploy.
#
# Defaults are tuned for the live adexads.com service in gameclaw-492005.
# Override any value with `--substitutions=_KEY=value` for other envs.
#
# Usage A — manual: `gcloud builds submit --config cloudbuild.yaml`
# Usage B — auto:   create a Cloud Build trigger in GCP console pointing at
#                   github.com/oratis/adex on `^main$`, with this file path.
#
# Memory bumped from the legacy 512Mi → 1Gi to give the agent runtime
# headroom (Tool Use API + prompt caching + adapter calls). max-instances=1
# is intentional: the in-process queue + 1-min snapshot dedupe in
# /api/agent/snapshot rely on a single-instance topology. If you scale out
# horizontally, swap rate-limit.ts to Memorystore + queue/in-process.ts to
# Cloud Tasks first.

substitutions:
  _SERVICE: adex
  _REGION: us-central1
  _SQL_INSTANCE: gameclaw-492005:us-central1:gameclaw-db
  _MEMORY: 1Gi
  _CPU: '1'
  _MAX_INSTANCES: '1'
  _SECRETS: ''            # comma-separated env=secret pairs (Secret Manager)
  _SERVICE_ACCOUNT: ''    # blank → keep current Cloud Run runtime SA

steps:
  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --tag
      - gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
      - --tag
      - gcr.io/$PROJECT_ID/${_SERVICE}:latest
      - .

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, gcr.io/$PROJECT_ID/${_SERVICE}]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        DEPLOY_ARGS=(
          run deploy "${_SERVICE}"
          --image "gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA"
          --region "${_REGION}"
          --platform managed
          --allow-unauthenticated
          --port 8080
          --cpu "${_CPU}"
          --memory "${_MEMORY}"
          --max-instances "${_MAX_INSTANCES}"
        )
        if [ -n "${_SQL_INSTANCE}" ]; then
          DEPLOY_ARGS+=(--add-cloudsql-instances "${_SQL_INSTANCE}")
        fi
        if [ -n "${_SECRETS}" ]; then
          DEPLOY_ARGS+=(--update-secrets "${_SECRETS}")
        fi
        if [ -n "${_SERVICE_ACCOUNT}" ]; then
          DEPLOY_ARGS+=(--service-account "${_SERVICE_ACCOUNT}")
        fi
        gcloud "${DEPLOY_ARGS[@]}"

images:
  - gcr.io/$PROJECT_ID/${_SERVICE}:$SHORT_SHA
  - gcr.io/$PROJECT_ID/${_SERVICE}:latest

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1200s
